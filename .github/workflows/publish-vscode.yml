name: Publish VS Code Extension

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: publish-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Visual Studio Marketplace
    if: github.repository == 'tsuyoshi-otake/otak-usage'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Linux test dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: xvfb-run -a npm run test --if-present

      - name: Package VSIX
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: otak-usage-vsix
          path: '*.vsix'
          if-no-files-found: error

      # Verify both registry tokens up front so a missing secret fails the run
      # before any partial publish.
      - name: Check registry tokens
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::error::VSCE_PAT secret is required to publish to Visual Studio Marketplace."
            exit 1
          fi
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::OVSX_PAT secret is required to publish to the Open VSX Registry."
            exit 1
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Publish to Visual Studio Marketplace
        run: npm run deploy -- --packagePath ./*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: npm run deploy:ovsx -- ./*.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
